services:

  postgres:

    image: postgres:17

    container_name: nebula-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: nebula

      POSTGRES_USER: nebula

      POSTGRES_PASSWORD: nebula

    ports:

      - "5432:5432"

    volumes:

      - postgres:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U nebula"]

      interval: 5s

      timeout: 5s

      retries: 5

  redis:

    image: redis:8

    container_name: nebula-redis

    restart: unless-stopped

    ports:

      - "6379:6379"

    volumes:

      - redis:/data

volumes:

  postgres:

  redis: